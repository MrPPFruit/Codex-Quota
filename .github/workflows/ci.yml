name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  macos:
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: swift test
      - run: npm run build:accessory
      - run: codesign --verify --deep --strict "artifacts/build/Codex Quota.app"

  windows:
    runs-on: windows-2025
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-dotnet@d4c94342e560b34958eacfc5d055d21461ed1c5d # v5.0.0
        with:
          dotnet-version: 10.0.301
      - run: dotnet build windows/CodexQuota.Windows.slnx --configuration Release
      - run: dotnet run --project windows/tests/CodexQuota.Core.Tests/CodexQuota.Core.Tests.csproj --configuration Release
      - run: dotnet run --project windows/tests/CodexQuota.App.Tests/CodexQuota.App.Tests.csproj --configuration Release
      - shell: pwsh
        run: ./windows/scripts/package-release.ps1 -Version 0.2.0-preview.1
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: codex-quota-windows-x64
          path: artifacts/windows-release/*
          if-no-files-found: error
