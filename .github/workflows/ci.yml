name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  macos:
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: swift test
      - run: npm run build:accessory
      - run: codesign --verify --deep --strict "artifacts/build/Codex Quota.app"

  windows:
    runs-on: windows-2025
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-dotnet@d4c94342e560b34958eacfc5d055d21461ed1c5d # v5.0.0
        with:
          dotnet-version: 10.0.301
      - run: dotnet build windows/CodexQuota.Windows.slnx --configuration Release
      - run: dotnet run --project windows/tests/CodexQuota.Core.Tests/CodexQuota.Core.Tests.csproj --configuration Release
      - run: dotnet run --project windows/tests/CodexQuota.App.Tests/CodexQuota.App.Tests.csproj --configuration Release
        env:
          CODEX_QUOTA_UI_CAPTURE_DIR: artifacts/windows-ui-captures
      - shell: pwsh
        run: ./windows/scripts/package-release.ps1 -Version 0.2.0-preview.2
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: codex-quota-windows-x64
          path: artifacts/windows-release/*
          if-no-files-found: error
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: codex-quota-windows-ui-captures
          path: artifacts/windows-ui-captures/*.png
          if-no-files-found: error
